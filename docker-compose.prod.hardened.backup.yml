# filename: docker-compose.prod.yml
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: embassy_db
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  backend:
    image: ghcr.io/eturbat4312/embassy-jakarta-backend:prod
    container_name: embassy_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
      - static:/app/static
    expose:
      - "8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  frontend:
    image: ghcr.io/eturbat4312/embassy-jakarta-frontend:prod
    container_name: embassy_frontend
    restart: unless-stopped
    environment:
      - API_INTERNAL_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  nginx:
    image: nginx:alpine
    container_name: embassy_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/var/www/media:ro
      - static:/var/www/static:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

volumes:
  postgres_data:
  media:
  static: