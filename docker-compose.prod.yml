# filename: docker-compose.prod.yml
version: "3.9"

services:
  db:
    image: postgres:16
    container_name: embassy_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: embassy
      POSTGRES_USER: embassy
      POSTGRES_PASSWORD: embassy_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: embassy_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
      # IMPORTANT: MUST match STATIC_ROOT=/app/static
      - static:/app/static
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn embassy_backend.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --timeout 60
             --access-logfile -
             --error-logfile -"
    environment:
      - GUNICORN_CMD_ARGS=--bind 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_MEDIA_BASE_URL: ""
    environment:
      - API_INTERNAL_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=/api
      - DEBUG_API=1
    container_name: embassy_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: embassy_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/var/www/media:ro
      - static:/var/www/static:ro

volumes:
  postgres_data:
  media:
  static:
